<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Green Islets — Plants & Mini Search</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  <style>
    :root{--bg:#071023;--card:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.06);--accent:#7dd3fc;--muted:#b7c2cf}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial;background:linear-gradient(180deg,#031021 0%,#071423 100%);color:#eaf6ff;min-height:100vh}
    .wrap{max-width:1100px;margin:28px auto;padding:20px}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1{font-size:20px;margin:0}
    .search {flex:1;display:flex;gap:8px;align-items:center;margin-left:18px}
    .search input{flex:1;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit;outline:none}
    .btn{background:linear-gradient(90deg,var(--accent),#60a5fa);color:#041626;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700}

    main{display:grid;grid-template-columns:360px 1fr;gap:18px;margin-top:18px}

    /* left column - list */
    .sidebar{padding:12px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03)}
    .list{display:flex;flex-direction:column;gap:10px}
    .card{display:flex;gap:10px;align-items:center;padding:10px;border-radius:12px;background:var(--card);cursor:pointer;border:1px solid rgba(255,255,255,0.02)}
    .card img{width:68px;height:68px;object-fit:cover;border-radius:10px;flex-shrink:0}
    .card .meta{flex:1}
    .card .meta .title{font-weight:700}
    .card .meta .muted{font-size:13px;color:var(--muted);margin-top:6px}

    /* right column - detail */
    .detail{padding:18px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.015),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03)}
    .island{background:rgba(255,255,255,0.04);padding:16px;border-radius:14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.03)}
    .hero{display:flex;gap:18px;align-items:flex-start}
    .hero img{width:320px;height:220px;object-fit:cover;border-radius:12px}
    .tags{margin-top:8px}
    .tag{display:inline-block;background:rgba(255,255,255,0.03);padding:6px 10px;border-radius:999px;margin-right:8px;font-size:13px;color:var(--muted)}
    .gallery{display:flex;gap:8px;margin-top:12px}
    .gallery img{width:86px;height:64px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent}
    .gallery img.selected{border-color:var(--accent)}

    .noresults{padding:40px;text-align:center;color:var(--muted)}

    footer{margin-top:18px;color:var(--muted);font-size:13px;text-align:center}

    @media (max-width:980px){main{grid-template-columns:1fr;}.hero{flex-direction:column}.hero img{width:100%;height:220px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div style="display:flex;align-items:center;gap:12px">
        <h1>Green Islets</h1>
        <div style="color:var(--muted);font-size:13px">A tiny plant site + in-browser search</div>
      </div>
      <div class="search">
        <input id="q" placeholder="Search plants, e.g. 'aloe', 'low light'..." autocomplete="off" />
        <button id="clear" class="btn">Clear</button>
      </div>
    </header>

    <main>
      <aside class="sidebar island" id="list-col">
        <div style="font-weight:700;margin-bottom:10px">Plants</div>
        <div class="list" id="list"></div>
      </aside>

      <section class="detail" id="detail-col">
        <div id="detail-root">
          <div class="noresults">Select a plant from the left or search to filter the list. Each description sits in a "text island" for readability.</div>
        </div>
      </section>
    </main>

    <footer>Built with a tiny JS search & client-side routing. Images from Unsplash.</footer>
  </div>

  <script>
    // ---------------------------
    // Sample plant data (5 plants)
    // Each plant has id, title, description, tags, images[]
    // Image sources use unsplash photos (permits hotlink for demo)
    // ---------------------------
    const plants = [
      {
        id: 'aloe',
        title: 'Aloe Vera',
        tags: ['succulent','easy care','indoor'],
        description: `Aloe vera is a resilient succulent known for its thick, fleshy leaves filled with soothing gel. It prefers bright, indirect light and infrequent watering — perfect for busy or beginner plant owners. The gel inside leaves is often used for skin-soothing purposes (after proper handling).`,
        images: [
          'https://images.unsplash.com/photo-1587300003388-59208cc962cb?auto=format&fit=crop&w=1200&q=60',
          'https://images.unsplash.com/photo-1541685907-4c5e2e9b9b5b?auto=format&fit=crop&w=1200&q=60'
        ]
      },
      {
        id: 'monstera',
        title: 'Monstera Deliciosa',
        tags: ['tropical','vining','indoor'],
        description: `Monstera deliciosa has dramatic, split leaves that become more fenestrated as the plant matures. It enjoys bright, indirect light and regular watering when the topsoil dries. Provide support as it grows for an impressive tropical look.`,
        images: [
          'https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1200&q=60',
          'https://images.unsplash.com/photo-1523413651479-597eb2da0ad6?auto=format&fit=crop&w=1200&q=60'
        ]
      },
      {
        id: 'snake',
        title: 'Snake Plant (Sansevieria)',
        tags: ['low light','easy care','air purifier'],
        description: `Snake plants are nearly indestructible, tolerating low light and long gaps between watering. Their upright, sword-like leaves make them a great architectural choice for homes and offices. They also help purify indoor air.`,
        images: [
          'https://images.unsplash.com/photo-1501004318641-92a3c3b0c1d6?auto=format&fit=crop&w=1200&q=60',
          'https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1200&q=60'
        ]
      },
      {
        id: 'peacelily',
        title: 'Peace Lily (Spathiphyllum)',
        tags: ['flowering','shade','indoor'],
        description: `Peace lilies are graceful, shade-loving plants that produce white spathes. They prefer moist soil and indirect light. Yellowing leaves often indicate the need for fresh water or different lighting.`,
        images: [
          'https://images.unsplash.com/photo-1524594154903-0f7a5c8b4f66?auto=format&fit=crop&w=1200&q=60',
          'https://images.unsplash.com/photo-1547514701-9cdcb1f594b2?auto=format&fit=crop&w=1200&q=60'
        ]
      },
      {
        id: 'ficus',
        title: 'Fiddle Leaf Fig',
        tags: ['statement','bright light','indoor'],
        description: `Fiddle Leaf Fig (Ficus lyrata) is prized for its large, violin-shaped leaves. It loves bright, filtered light and consistent care. Avoid moving it too often — it dislikes sudden changes in environment.`,
        images: [
          'https://images.unsplash.com/photo-1501004318641-7f6b6d6e2b1a?auto=format&fit=crop&w=1200&q=60',
          'https://images.unsplash.com/photo-1542736667-069246bdbc73?auto=format&fit=crop&w=1200&q=60'
        ]
      }
    ];

    // ---------------------------
    // Simple client-side index + search
    // ---------------------------
    const listEl = document.getElementById('list');
    const detailRoot = document.getElementById('detail-root');
    const qInput = document.getElementById('q');
    const clearBtn = document.getElementById('clear');

    function renderList(items, highlightTerms=[]){
      listEl.innerHTML = '';
      if(items.length === 0){ listEl.innerHTML = '<div class="noresults">No plants match that query.</div>'; return; }
      items.forEach(p => {
        const card = document.createElement('div'); card.className='card'; card.tabIndex=0;
        card.addEventListener('click', ()=> openPlant(p.id));
        card.addEventListener('keypress', (e)=>{ if(e.key==='Enter') openPlant(p.id); });
        const img = document.createElement('img'); img.src = p.images[0]; img.alt = p.title;
        const meta = document.createElement('div'); meta.className='meta';
        const title = document.createElement('div'); title.className='title'; title.innerHTML = highlightText(p.title, highlightTerms);
        const muted = document.createElement('div'); muted.className='muted'; muted.textContent = p.tags.join(' • ');
        meta.appendChild(title); meta.appendChild(muted);
        const btn = document.createElement('button'); btn.className='btn'; btn.textContent='Check it out'; btn.style.padding='8px 10px'; btn.style.fontSize='13px';
        btn.addEventListener('click', (e)=>{ e.stopPropagation(); openPlant(p.id); });
        card.appendChild(img); card.appendChild(meta); card.appendChild(btn);
        listEl.appendChild(card);
      });
    }

    function highlightText(text, terms){
      if(!terms || terms.length===0) return escapeHtml(text);
      let out = escapeHtml(text);
      terms.forEach(t=>{
        const re = new RegExp('('+escapeRegExp(t)+')','ig');
        out = out.replace(re, '<mark>$1</mark>');
      });
      return out;
    }

    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;" })[c]); }
    function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\\]\\]/g,'\\$&'); }

    // basic search - matches title, tags, description
    function search(q){
      const terms = q.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
      if(terms.length===0) return plants.slice();
      return plants.filter(p => {
        const hay = (p.title + ' ' + p.tags.join(' ') + ' ' + p.description).toLowerCase();
        return terms.every(t => hay.includes(t));
      });
    }

    // detail view
    function openPlant(id){
      const p = plants.find(x=>x.id===id);
      if(!p) return;
      window.location.hash = '#plant-' + id;
      renderDetail(p);
    }

    function renderDetail(p){
      detailRoot.innerHTML = '';
      const container = document.createElement('div'); container.className='island';
      const hero = document.createElement('div'); hero.className='hero';
      const img = document.createElement('img'); img.src = p.images[0]; img.alt = p.title; img.id='hero-img';
      const info = document.createElement('div'); info.style.flex='1';
      const title = document.createElement('h2'); title.textContent = p.title; title.style.margin='0 0 8px 0';
      const tags = document.createElement('div'); tags.className='tags'; p.tags.forEach(t=>{ const s=document.createElement('span'); s.className='tag'; s.textContent=t; tags.appendChild(s); });
      const desc = document.createElement('div'); desc.style.marginTop='12px'; desc.innerHTML = '<p>'+escapeHtml(p.description)+'</p>';
      const gallery = document.createElement('div'); gallery.className='gallery';
      p.images.forEach((src, i)=>{ const im = document.createElement('img'); im.src=src; im.alt=p.title+' '+(i+1); if(i===0) im.classList.add('selected'); im.addEventListener('click', ()=>{ document.querySelectorAll('.gallery img').forEach(x=>x.classList.remove('selected')); im.classList.add('selected'); document.getElementById('hero-img').src = src; }); gallery.appendChild(im); });

      const back = document.createElement('button'); back.className='btn'; back.textContent='Back to list'; back.style.marginTop='14px'; back.addEventListener('click', ()=>{ window.location.hash = ''; renderList(search(qInput.value), tokenize(qInput.value)); detailRoot.innerHTML = '<div class="noresults">Select a plant from the left or search to filter the list.</div>'; });

      info.appendChild(title); info.appendChild(tags); info.appendChild(desc); info.appendChild(gallery); info.appendChild(back);
      hero.appendChild(img); hero.appendChild(info);
      container.appendChild(hero);
      detailRoot.appendChild(container);
    }

    function tokenize(q){ return q.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean); }

    // wire up search
    function doSearch(){ const q = qInput.value.trim(); const results = search(q); renderList(results, tokenize(q)); }
    const debounce = (fn,ms=180)=>{ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; };
    qInput.addEventListener('input', debounce(doSearch,150)); clearBtn.addEventListener('click', ()=>{ qInput.value=''; qInput.focus(); doSearch(); });

    // on load
    renderList(plants);

    // handle hash routing (direct link support)
    function handleHash(){ const h = window.location.hash; if(!h) { detailRoot.innerHTML = '<div class="noresults">Select a plant from the left or search to filter the list.</div>'; return; } if(h.startsWith('#plant-')){ const id = h.replace('#plant-',''); const p = plants.find(x=>x.id===id); if(p) renderDetail(p); }
    }
    window.addEventListener('hashchange', handleHash);
    handleHash();

  </script>
</body>
</html>
